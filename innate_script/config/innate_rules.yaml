# ======================================================================
# AP Innate Rules (IESM Rules)
# AP 先天规则（先天编码脚本管理器 IESM 的规则文件）
#
# This file is generated/updated by the Observatory UI or tools.
# 本文件可由观测台前端或工具生成/更新。
#
# Quick Start / 快速开始：
# 1) 运行 `python -m observatory` 启动观测台
# 2) 打开浏览器侧边栏「先天规则 / Innate Rules」
# 3) 校验 / Validate -> 保存并热加载 / Save + Reload
# 4) 用最近一轮模拟 / Simulate 查看触发结果
#
# Schema / 结构提示：
# - Top-level: rules_schema_version, rules_version, enabled, defaults, rules
# - Rule item: id, title, enabled, phase, priority, cooldown_ticks, when, then, note
# - Optional: ui (editor metadata, ignored by the engine)
#   可选：ui（编辑器元信息，规则引擎会忽略）
# - when supports: any/all/not + cfs/state_window/timer
# - then supports: cfs_emit/focus/emit_script/emotion_update/action_trigger/pool_energy/pool_bind_attribute/delay/branch/log
#
# Tips / 提示：
# - Keep rule ids stable for auditing.
#   规则 id 请保持稳定，便于审计与回滚。
# - Rules are pure data, no Python code execution.
#   规则是纯数据，不执行 Python 代码。
# ======================================================================
rules_schema_version: '1.0'
rules_version: '0.10'
enabled: true
defaults:
  focus_directive:
    ttl_ticks: 2
    focus_boost: 0.9
    deduplicate_by: target_ref_object_id
    max_directives_per_rule: 8
  habituation:
    enabled: true
    window_ticks: 10
    start_total: 6.0
    full_total: 18.0
    min_scale: 0.0
  cfs_repeat_fatigue:
    enabled: true
    standalone_only: false
    window_ticks: 8
    recovery_gap_ticks: 3
    start_hits: 2
    full_hits: 6
    min_scale: 0.32
rules:
- id: state_window_fast_cp_rise
  title: 状态窗口：认知压（CP）快速上升 -> 触发记录（emit_script）
  enabled: true
  phase: directives
  priority: 50
  cooldown_ticks: 0
  when:
    state_window:
      stage: any
      fast_cp_rise_min: 1
  then:
  - emit_script:
      script_id: innate_state_window_cp_rise
      script_kind: window_trigger
      priority: 50
      trigger: fast_cp_rise
  note: >-
    MVP 对接 StatePool 的 script_check_packet：当状态窗口检测到认知压 CP 在短时间内快速上升时，先记录一个可观测的 emit_script
    事件，供前端、日志和后续 IESM 扩展使用。该规则只负责把“状态变化已经发生”外显出来，不直接改变能量、情绪递质或行动驱动。
- id: state_window_fast_cp_drop
  title: 状态窗口：认知压（CP）快速下降 -> 触发记录（emit_script）
  enabled: true
  phase: directives
  priority: 50
  cooldown_ticks: 0
  when:
    state_window:
      stage: any
      fast_cp_drop_min: 1
  then:
  - emit_script:
      script_id: innate_state_window_cp_drop
      script_kind: window_trigger
      priority: 50
      trigger: fast_cp_drop
  note: >-
    MVP 对接 StatePool 的 script_check_packet：当状态窗口检测到认知压 CP 在短时间内快速下降时，先记录一个可观测的 emit_script
    事件，供前端、日志和后续规则联动使用。该规则用于观察“压力/违和回落”的时机，本身不直接发放奖励或正确感。
- id: cfs_dissonance_from_cp_abs
  title: CFS脚本：认知压大小（|CP|）-> 违和感（持续态 + 属性绑定）
  enabled: true
  phase: cfs
  priority: 90
  cooldown_ticks: 0
  when:
    metric:
      preset: cp_abs_state
      metric: ''
      channel: ''
      mode: state
      op: exists
      match_policy: any
      value: null
      min: null
      max: null
      prev_gate: null
      window_ticks: 4
      selector:
        mode: top_n
        top_n: 8
        ref_object_types:
        - st
        - sa
      capture_as: ''
      epsilon: 1.0e-09
      note: ''
  then:
  - cfs_emit:
      kind: dissonance
      from: metric_matches
      scope: object
      max_signals: 4
      emit_gate:
        mode: strength_delta
        min_delta: 0.05
        min_interval_ticks: 2
        bind_attribute_even_when_skipped: true
      min_strength: 0.3
      strength:
        from: match_value
        policy: linear_clamp
        min: 0.0
        max: 2.0
        out_min: 0.0
        out_max: 1.0
      bind_attribute:
        attribute_name: cfs_dissonance
        display: 违和感:{{{strength}}}
        value_from: strength
        value_type: numerical
        modality: internal
        er: '{{{strength}}}'
        ev: 0.0
  note: >-
    对齐理论 3.8.2：违和感来自高偏差或高认知压。当前原型以状态池对象的 |CP| 作为近似指标，在对象级生成 dissonance，并把认知感受作为先天规则触发的 CFS
    写入运行态。由于这是先天编码脚本直接产生的认知感受，其绑定属性默认携带 ER 而不是 EV；后续若同类感受由感应赋能产生，才应体现为 EV。重复触发会受 habituation /
    cfs_repeat_fatigue 限制，避免长期霸占 top。
  habituation:
    enabled: true
    window_ticks: 8
    start_total: 2.0
    full_total: 5.0
    min_scale: 0.18
- id: cfs_punish_signal_from_cp_abs_high
  title: CFS脚本：强违和（|CP|高）-> 惩罚信号（punish_signal，属性绑定）
  enabled: true
  phase: cfs
  priority: 89
  cooldown_ticks: 0
  when:
    metric:
      preset: cp_abs_state
      metric: ''
      channel: ''
      mode: state
      op: '>='
      match_policy: any
      value: 0.82
      min: null
      max: null
      prev_gate: null
      window_ticks: 4
      selector:
        mode: top_n
        top_n: 8
        ref_object_types:
        - st
        - sa
      capture_as: ''
      epsilon: 1.0e-09
      note: ''
  then:
  - pool_bind_attribute:
      selector:
        mode: specific_item
        item_id: '{{{match_item_id}}}'
      attribute:
        attribute_name: punish_signal
        attribute_value: '{{{match_value}}}'
        raw: punish_signal:{{{match_value}}}
        display: 惩罚信号:{{{match_value}}}
        value_type: numerical
        modality: internal
        er: 0.0
        ev: 0.0
      reason: iesm:strong_dissonance->punish_signal (weighted)
  note: >-
    强违和到惩罚信号的桥接规则：当 |CP| 高于阈值时，把 punish_signal 作为属性绑定到对应对象，供压力、行动阈值和 NT 调制链路读取。这里的 punish_signal
    是“惩罚/警戒线索”的结构化标记，不等于直接给对象注入惩罚能量；实际能量和递质变化由后续规则与状态池统计共同决定。
- id: cfs_correct_event_from_cp_abs_drop
  title: CFS脚本：违和显著下降 -> 正确事件（硬约束：上一tick需处于违和）
  enabled: true
  phase: cfs
  priority: 85
  cooldown_ticks: 0
  when:
    metric:
      preset: got_cp_abs
      metric: ''
      channel: ''
      mode: state
      op: <=
      match_policy: any
      value: -0.8
      min: null
      max: null
      prev_gate:
        op: '>='
        value: 0.8
      window_ticks: 4
      selector:
        mode: top_n
        top_n: 12
        ref_object_types:
        - st
        - sa
        where:
          cp_abs:
            op: <=
            value: 0.45
      capture_as: ''
      epsilon: 1.0e-09
      note: ''
  then:
  - cfs_emit:
      kind: correct_event
      from: metric_matches
      scope: object
      max_signals: 6
      capture_as: correct_strength
      strength:
        from: match_value
        abs: true
        policy: linear_clamp
        min: 0.5
        max: 1.2
        out_min: 0.4
        out_max: 1.0
      bind_attributes:
      - attribute_name: cfs_correct_event
        display: 正确事件:{{{strength}}}
        value_from: strength
        value_type: numerical
        modality: internal
        er: '{{{strength}}}'
        ev: 0.0
      - attribute_name: cfs_correctness
        display: 正确感:{{{strength}}}
        value_from: strength
        value_type: numerical
        modality: internal
        er: '{{{strength}}}'
        ev: 0.0
  - pool_bind_attribute:
      selector:
        mode: specific_item
        item_id: '{{{match_item_id}}}'
      attribute:
        attribute_name: reward_signal
        attribute_value: '{{{correct_strength}}}'
        raw: reward_signal:{{{correct_strength}}}
        display: 奖励信号:{{{correct_strength}}}
        value_type: numerical
        modality: internal
        er: 0.0
        ev: 0.0
      reason: iesm:correct_event->reward_signal (weighted)
  - pool_bind_attribute:
      selector:
        mode: specific_item
        item_id: '{{{match_item_id}}}'
      attribute:
        attribute_name: cfs_correctness
        attribute_value: '{{{strength}}}'
        raw: cfs_correctness:{{{strength}}}
        display: 正确感:{{{strength}}}
        value_type: numerical
        modality: internal
        er: '{{{strength}}}'
        ev: 0.0
      reason: iesm:correct_event->cfs_correctness (dissonance drop)
  note: >-
    对齐理论 3.8.2：正确事件必须依托“上一阶段确实处于违和/高认知压，随后显著回落”。本规则使用 prev_gate 约束上一 tick 的 |CP|，避免把普通低 CP
    误判为正确感；触发后同时产生 correct_event、correctness，并绑定 reward_signal，作为期待通道和奖惩塑形链路的正向证据。
  habituation:
    enabled: true
    window_ticks: 8
    start_total: 2.4
    full_total: 5.4
    min_scale: 0.24
- id: cfs_surprise_from_er_surge_cp_positive
  title: CFS脚本：实能量突增且实高于虚（CP>0） -> 惊（surprise）
  enabled: true
  phase: cfs
  priority: 80
  cooldown_ticks: 0
  when:
    metric:
      preset: got_er
      metric: ''
      channel: ''
      mode: state
      op: '>='
      match_policy: any
      value: 0.7
      min: null
      max: null
      prev_gate: null
      window_ticks: 4
      selector:
        mode: top_n
        top_n: 12
        ref_object_types:
        - st
        - sa
        where:
          cp_delta:
            op: '>='
            value: 0.5
          input_is_empty:
            op: <=
            value: 0
      capture_as: ''
      epsilon: 1.0e-09
      note: ''
  then:
  - cfs_emit:
      kind: surprise
      from: metric_matches
      scope: object
      max_signals: 6
      strength:
        from: match_value
        policy: linear_clamp
        min: 0.5
        max: 1.5
        out_min: 0.3
        out_max: 1.0
      bind_attribute:
        attribute_name: cfs_surprise
        display: 惊:{{{strength}}}
        value_from: strength
        value_type: numerical
        modality: internal
        er: '{{{strength}}}'
        ev: 0.0
  note: >-
    对齐理论 3.8.2：惊来自实能量侧短时突增，并且应更偏向“现实证据突然变强”而非单纯想象增强。当前用 got_er 近似实能量突增，并要求 cp_delta >= 0 / CP
    为正来过滤 EV 侧突增造成的误报。该信号主要服务于唤醒、新奇和短期注意转移。
  habituation:
    enabled: true
    window_ticks: 8
    start_total: 2.0
    full_total: 4.8
    min_scale: 0.22
- id: cfs_expectation_from_reward_pred
  title: CFS脚本：预测对象（EV高）且包含奖励信号 -> 期待（并安排“渐变验证/不验”）
  enabled: true
  phase: cfs
  priority: 75
  cooldown_ticks: 0
  when:
    metric:
      preset: ev_state
      metric: ''
      channel: ''
      mode: state
      op: '>='
      match_policy: any
      value: 0.3
      min: null
      max: null
      prev_gate: null
      window_ticks: 4
      selector:
        mode: has_attribute
        scope: packet
        attribute_names:
        - reward_signal
        - teacher_reward_signal
        ref_object_types:
        - st
        - sa
      capture_as: expect_pred_ev
      epsilon: 1.0e-09
      note: ''
  then:
  - cfs_emit:
      kind: expectation
      from: metric_matches
      scope: object
      max_signals: 1
      emit_gate:
        mode: strength_delta
        min_delta: 0.03
        min_interval_ticks: 1
        bind_attribute_even_when_skipped: true
      capture_as: expect_strength
      strength:
        from: match_value
        policy: linear_clamp
        min: 0.3
        max: 1.5
        out_min: 0.3
        out_max: 1.0
      bind_attribute:
        attribute_name: cfs_expectation
        display: 期待:{{{strength}}}
        value_from: strength
        value_type: numerical
        modality: internal
        er: '{{{strength}}}'
        ev: 0.0
  - branch:
      when:
        metric:
          preset: er_rate
          metric: ''
          channel: ''
          mode: avg_rate
          op: exists
          match_policy: any
          value: null
          min: null
          max: null
          prev_gate: null
          window_ticks: 4
          selector:
            mode: specific_item
            item_id: '{{{match_item_id}}}'
          capture_as: expect_er_rate
          epsilon: 1.0e-09
          note: ''
      then:
      - cfs_emit:
          kind: expectation_verified
          from: metric_matches
          scope: object
          target:
            from: specific_ref
            ref_object_id: '{{{match_verification_anchor_ref_object_id}}}'
            ref_object_type: '{{{match_verification_anchor_ref_object_type}}}'
            display: '{{{match_verification_anchor_display}}}'
          max_signals: 1
          emit_gate:
            mode: strength_delta
            min_delta: 0.03
            min_interval_ticks: 1
            bind_attribute_even_when_skipped: true
          min_strength: 0.02
          strength:
            from: var
            var: expect_strength
            policy: verify_mix
            part: verified
            pred_var: expect_pred_ev
            actual_var: expect_er_rate
            actual_scale: 4.0
            gamma: 1.0
            eps: 1e-6
          bind_attribute:
            attribute_name: cfs_expectation_verified
            display: 期待验证:{{{strength}}}
            value_from: strength
            value_type: numerical
            modality: internal
            er: '{{{strength}}}'
            ev: 0.0
      - cfs_emit:
          kind: expectation_unverified
          from: metric_matches
          scope: object
          target:
            from: specific_ref
            ref_object_id: '{{{match_verification_anchor_ref_object_id}}}'
            ref_object_type: '{{{match_verification_anchor_ref_object_type}}}'
            display: '{{{match_verification_anchor_display}}}'
          max_signals: 1
          emit_gate:
            mode: strength_delta
            min_delta: 0.03
            min_interval_ticks: 1
            bind_attribute_even_when_skipped: true
          min_strength: 0.02
          strength:
            from: var
            var: expect_strength
            policy: verify_mix
            part: unverified
            pred_var: expect_pred_ev
            actual_var: expect_er_rate
            actual_scale: 4.0
            gamma: 1.0
            eps: 1e-6
          bind_attribute:
            attribute_name: cfs_expectation_unverified
            display: 期待不验:{{{strength}}}
            value_from: strength
            value_type: numerical
            modality: internal
            er: '{{{strength}}}'
            ev: 0.0
      else:
      - cfs_emit:
          kind: expectation_unverified
          from: single
          scope: object
          target:
            from: specific_ref
            ref_object_id: '{{{match_verification_anchor_ref_object_id}}}'
            ref_object_type: '{{{match_verification_anchor_ref_object_type}}}'
            display: '{{{match_verification_anchor_display}}}'
          max_signals: 1
          emit_gate:
            mode: strength_delta
            min_delta: 0.03
            min_interval_ticks: 1
            bind_attribute_even_when_skipped: true
          min_strength: 0.02
          strength:
            from: var
            var: expect_strength
            policy: verify_mix
            part: unverified
            pred_var: expect_pred_ev
            actual_var: expect_er_rate
            actual_scale: 4.0
            gamma: 1.0
            eps: 1e-6
          bind_attribute:
            attribute_name: cfs_expectation_unverified
            display: 期待不验:{{{strength}}}
            value_from: strength
            value_type: numerical
            modality: internal
            er: '{{{strength}}}'
            ev: 0.0
      on_error: []
      note: ''
  note: >-
    对齐理论 3.8.2：期待来自“预测结构 EV + 奖励信号”的组合。规则优先读取 packet / EV 口径中的奖励预测结构，触发 expectation 后安排
    verify_mix 分支，让后续现实证据以连续分数验证或不验证该期待。这个实现是实时持续验证，不是硬编码固定时机；它允许部分命中、对称对抗，并为“预测逐步收敛”提供可观测信号。
  habituation:
    enabled: true
    window_ticks: 8
    start_total: 2.1
    full_total: 5.0
    min_scale: 0.2
- id: cfs_expectation_from_teacher_reward_runtime_state_fallback
  title: CFS脚本：教师奖励态回落到运行态对象时 -> 期待（渐变验证/不验）
  enabled: true
  phase: cfs
  priority: 74
  cooldown_ticks: 0
  when:
    all:
    - metric:
        preset: total_energy_state
        metric: ''
        channel: ''
        mode: state
        op: '>='
        match_policy: any
        value: 0.25
        min: null
        max: null
        prev_gate: null
        window_ticks: 4
        selector:
          mode: has_attribute
          scope: all
          attribute_name: teacher_reward_signal
          ref_object_types:
          - st
        capture_as: expect_teacher_total_energy
        epsilon: 1.0e-09
        note: ''
    - not:
        metric:
          preset: ev_state
          metric: ''
          channel: ''
          mode: state
          op: '>='
          match_policy: any
          value: 0.3
          min: null
          max: null
          prev_gate: null
          window_ticks: 4
          selector:
            mode: has_attribute
            scope: packet
            attribute_names:
            - reward_signal
            - teacher_reward_signal
            ref_object_types:
            - st
            - sa
          capture_as: ''
          epsilon: 1.0e-09
          note: ''
  then:
  - cfs_emit:
      kind: expectation
      from: metric_matches
      scope: object
      max_signals: 1
      emit_gate:
        mode: strength_delta
        min_delta: 0.03
        min_interval_ticks: 1
        bind_attribute_even_when_skipped: true
      capture_as: expect_teacher_strength
      strength:
        from: match_value
        policy: linear_clamp
        min: 0.25
        max: 1.5
        out_min: 0.22
        out_max: 0.9
      bind_attribute:
        attribute_name: cfs_expectation
        display: 期待:{{{strength}}}
        value_from: strength
        value_type: numerical
        modality: internal
        er: '{{{strength}}}'
        ev: 0.0
  - branch:
      when:
        metric:
          preset: er_rate
          metric: ''
          channel: ''
          mode: avg_rate
          op: exists
          match_policy: any
          value: null
          min: null
          max: null
          prev_gate: null
          window_ticks: 4
          selector:
            mode: specific_item
            item_id: '{{{match_item_id}}}'
          capture_as: expect_teacher_er_rate
          epsilon: 1.0e-09
          note: ''
      then:
      - cfs_emit:
          kind: expectation_verified
          from: metric_matches
          scope: object
          target:
            from: specific_ref
            ref_object_id: '{{{match_verification_anchor_ref_object_id}}}'
            ref_object_type: '{{{match_verification_anchor_ref_object_type}}}'
            display: '{{{match_verification_anchor_display}}}'
          max_signals: 1
          emit_gate:
            mode: strength_delta
            min_delta: 0.03
            min_interval_ticks: 1
            bind_attribute_even_when_skipped: true
          min_strength: 0.02
          strength:
            from: var
            var: expect_teacher_strength
            policy: verify_mix
            part: verified
            pred_var: expect_teacher_total_energy
            actual_var: expect_teacher_er_rate
            actual_scale: 4.0
            gamma: 1.0
            eps: 1e-6
          bind_attribute:
            attribute_name: cfs_expectation_verified
            display: 期待验证:{{{strength}}}
            value_from: strength
            value_type: numerical
            modality: internal
            er: '{{{strength}}}'
            ev: 0.0
      - cfs_emit:
          kind: expectation_unverified
          from: metric_matches
          scope: object
          target:
            from: specific_ref
            ref_object_id: '{{{match_verification_anchor_ref_object_id}}}'
            ref_object_type: '{{{match_verification_anchor_ref_object_type}}}'
            display: '{{{match_verification_anchor_display}}}'
          max_signals: 1
          emit_gate:
            mode: strength_delta
            min_delta: 0.03
            min_interval_ticks: 1
            bind_attribute_even_when_skipped: true
          min_strength: 0.02
          strength:
            from: var
            var: expect_teacher_strength
            policy: verify_mix
            part: unverified
            pred_var: expect_teacher_total_energy
            actual_var: expect_teacher_er_rate
            actual_scale: 4.0
            gamma: 1.0
            eps: 1e-6
          bind_attribute:
            attribute_name: cfs_expectation_unverified
            display: 期待不验:{{{strength}}}
            value_from: strength
            value_type: numerical
            modality: internal
            er: '{{{strength}}}'
            ev: 0.0
      else:
      - cfs_emit:
          kind: expectation_unverified
          from: single
          scope: object
          target:
