dataset_id: companion_bot_chat_pure_large_v1
title: 大规模纯净聊天训练集
description: 纯净 companion-bot 聊天训练集。实际 text 字段只包含自然会话内容；角色、教师奖惩、if 期望契约和设计注释全部放在 labels
  或外部设计说明中。
experiment_goal: 用重复但有轻微变化的日常聊天、天气查询、任务规划、回忆、纠错、情绪安抚和教师反馈，测试 AP 原型在纯净语料下的结构学习、行动闭环、奖惩塑形和时间间隔感受。
evaluation_dimensions:
- 纯净文本是否避免标签符号污染结构内容
- 明确天气查询是否更稳定触发 weather_stub 行动
- 弱天气线索是否形成保守行动或澄清倾向
- 教师奖励和惩罚是否影响后续注意力与行动竞争
- 高频短句和轻微变体是否形成可回忆结构
- 空 tick 时间间隔是否支持状态延续与衰减观察
notes:
- 每个真实文本 tick 后跟 5 个空 tick，模拟真实对话间隔。
- 真实训练文本不含角色前缀、括号标签、Markdown 标记或技术注释。
- 天气相关 if 样本通过 labels.expectation_contracts 描述，反馈 tick 的文本也保持自然句。
seed: 20260430
time_basis: tick
tick_dt_ms: 3000
