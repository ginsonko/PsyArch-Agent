dataset_id: ap_behavioral_curriculum_small_v2
title: AP 行为课程小规模数据集 v2
description: AP 行为课程数据集。真实 text 字段只包含自然中文输入；角色、教师奖惩、expectation contracts 和实验预期全部在
  labels 或旁路设计说明中。
experiment_goal: 用 10 个可审计实验片段覆盖词汇抽象、新颖违和、教师奖惩、行动训练、时间回忆、注意力调节、残差记忆、矛盾安抚和重复疲劳，观察 AP
  原型在冷启动语料中的局部规律学习。
evaluation_dimensions:
- 训练文本是否保持纯净，不含角色括号或技术标记
- 重复句式是否能在替换变量后形成稳定结构
- 教师奖励/惩罚是否被绑定到正确的当前对象或上下文对象
- 明确天气查询、隐式天气问句、弱天气提及是否呈现不同行动倾向
- 空 tick 后是否能观察到时间感受、状态衰减和近因召回
- 复杂输入是否触发注意力聚焦或简化相关感受
- 局部线索是否能激活组合记忆或残差记忆投影
- 矛盾调和后是否出现安抚、缓解或正确感相关指标
- 重复和可控新鲜度是否能同时暴露 repetition 与 NOV 通道
notes:
- 每个真实文本 tick 后固定跟随 5 个空 tick，总 tick = 真实输入 * 6。
- 小规模正好覆盖 10 个实验各 5 条真实输入；中规模重复 10 个确定性变体；大规模重复 100 个确定性变体。
- 预期不进入训练过程；LLM 审阅模块应读取旁路设计说明和运行输出进行对照。
